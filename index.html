<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的原创音乐 - 回忆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 微软雅黑;
        }
        body {
            background: #121212;
            min-height: 100vh;
            color: #fff;
            padding: 30px 20px;
        }
        h1 {
            color: #d4af37;
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 40px;
            font-size: 32px;
        }
        .music-container {
            max-width: 600px;
            margin: 0 auto;
            background: #1e1e1e;
            border: 2px solid #d4af37;
            border-radius: 15px;
            padding: 30px 20px;
        }
        .cover {
            width: 200px;
            height: 200px;
            border-radius: 10px;
            margin: 0 auto 25px;
            background: #222;
            border: 2px solid #d4af37;
        }
        .song-info {
            text-align: center;
            margin-bottom: 25px;
        }
        .song-title {
            font-size: 24px;
            font-weight: bold;
            color: #d4af37;
            margin-bottom: 8px;
        }
        .song-singer {
            font-size: 16px;
            color: #888;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #d4af37;
            color: #121212;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .btn:hover {
            background: #b9962c;
            transform: scale(1.05);
        }
        .progress {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .progress-bar {
            height: 100%;
            background: #d4af37;
            border-radius: 4px;
            width: 0%;
        }
        .time {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }
        .lyrics {
            height: 160px;
            overflow-y: auto;
            text-align: center;
            line-height: 1.8;
            font-size: 16px;
            padding: 10px;
            background: #222;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .lyrics::-webkit-scrollbar {
            width: 5px;
        }
        .lyrics::-webkit-scrollbar-track {
            background: #333;
            border-radius: 5px;
        }
        .lyrics::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 5px;
        }
        .lyric-line {
            transition: 0.3s;
            opacity: 0.6;
        }
        .lyric-line.active {
            color: #d4af37;
            opacity: 1;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>我的原创音乐空间</h1>
    <div class="music-container">
        <div class="cover"></div>
        <div class="song-info">
            <div class="song-title" id="songTitle">回忆</div>
            <div class="song-singer" id="songSinger">陈以文</div>
        </div>
        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="time">
            <span id="currentTime">00:00</span>
            <span id="duration">00:00</span>
        </div>
        <div class="controls">
            <button class="btn" id="prevBtn">◀</button>
            <button class="btn" id="playBtn">▶</button>
            <button class="btn" id="nextBtn">▶▶</button>
        </div>
        <div class="lyrics" id="lyrics"></div>
    </div>

    <script>
        // 100% 精准匹配你现在的歌曲路径
        const audio = new Audio("music/Song1Memories.mp3");
        let isPlaying = false;

        // 完整歌词
        const lyrics = [
            {time:0, text:"回忆"},
            {time:1, text:"作词：穆华恩、陈以文"},
            {time:3, text:"作曲、演唱：陈以文"},
            {time:7, text:"当我拿起笔 写下这段旋律"},
            {time:11, text:"心中的话 终于可以表达"},
            {time:15, text:"过往的回忆 都已成过去"},
            {time:19, text:"你留下的痕迹 触动我的心"},
        ];

        // 加载歌词
        function loadLyrics(){
            const box = document.getElementById("lyrics");
            lyrics.forEach(item=>{
                let div = document.createElement("div");
                div.className = "lyric-line";
                div.dataset.time = item.time;
                div.innerText = item.text;
                box.appendChild(div);
            });
        }

        // 播放控制
        document.getElementById("playBtn").onclick = function(){
            if(isPlaying){
                audio.pause();
                this.innerText = "▶";
            }else{
                audio.play();
                this.innerText = "❙❙";
            }
            isPlaying = !isPlaying;
        }

        // 进度同步
        audio.addEventListener("timeupdate",function(){
            if(!this.duration) return;
            let percent = (this.currentTime / this.duration) * 100;
            document.getElementById("progressBar").style.width = percent + "%";
            document.getElementById("currentTime").innerText = formatTime(this.currentTime);
            document.getElementById("duration").innerText = formatTime(this.duration);
            syncLyric(this.currentTime);
        });

        function formatTime(t){
            let m = Math.floor(t/60).toString().padStart(2,"0");
            let s = Math.floor(t%60).toString().padStart(2,"0");
            return m+":"+s;
        }

        // 歌词高亮滚动
        function syncLyric(current){
            let lines = document.querySelectorAll(".lyric-line");
            lines.forEach(line=>line.classList.remove("active"));
            let activeIdx = -1;
            for(let i=0;i<lines.length;i++){
                if(current >= Number(lines[i].dataset.time)) activeIdx = i;
            }
            if(activeIdx >=0){
                lines[activeIdx].classList.add("active");
                lines[activeIdx].scrollIntoView({behavior:"smooth",block:"center"});
            }
        }

        // 进度条点击跳转
        document.getElementById("progress").onclick = function(e){
            if(!audio.duration) return;
            let pos = e.offsetX / this.offsetWidth;
            audio.currentTime = pos * audio.duration;
        }

        loadLyrics();
    </script>
</body>
</html>
