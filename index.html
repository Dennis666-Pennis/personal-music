<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的原创音乐 - 回忆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 微软雅黑;
        }
        body {
            background: #121212;
            min-height: 100vh;
            color: #fff;
            padding: 30px 20px;
        }
        h1 {
            color: #d4af37;
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 40px;
            font-size: 32px;
        }
        .music-container {
            max-width: 600px;
            margin: 0 auto;
            background: #1e1e1e;
            border: 2px solid #d4af37;
            border-radius: 15px;
            padding: 30px 20px;
        }
        .cover {
            width: 200px;
            height: 200px;
            border-radius: 10px;
            margin: 0 auto 25px;
            background: #222;
            border: 2px solid #d4af37;
        }
        .song-info {
            text-align: center;
            margin-bottom: 25px;
        }
        .song-title {
            font-size: 24px;
            font-weight: bold;
            color: #d4af37;
            margin-bottom: 8px;
        }
        .song-singer {
            font-size: 16px;
            color: #888;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #d4af37;
            color: #121212;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .btn:hover {
            background: #b9962c;
            transform: scale(1.05);
        }
        .progress {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .progress-bar {
            height: 100%;
            background: #d4af37;
            border-radius: 4px;
            width: 0%;
        }
        .time {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }
        .lyrics {
            height: 160px;
            overflow-y: auto;
            text-align: center;
            line-height: 1.8;
            font-size: 16px;
            padding: 10px;
            background: #222;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .lyrics::-webkit-scrollbar {
            width: 5px;
        }
        .lyrics::-webkit-scrollbar-track {
            background: #333;
            border-radius: 5px;
        }
        .lyrics::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 5px;
        }
        .lyric-line {
            transition: 0.3s;
            opacity: 0.6;
        }
        .lyric-line.active {
            color: #d4af37;
            opacity: 1;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>我的原创音乐</h1>
    <div class="music-container">
        <div class="cover"></div>
        <div class="song-info">
            <div class="song-title" id="songTitle">回忆</div>
            <div class="song-singer" id="songSinger">James/H</div>
        </div>
        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="time">
            <span id="currentTime">00:00</span>
            <span id="duration">00:00</span>
        </div>
        <div class="controls">
            <button class="btn" id="playBtn">▶</button>
        </div>
        <div class="lyrics" id="lyrics"></div>
    </div>

    <script>
        const audio = new Audio("Song1Memories.mp3");
        let isPlaying = false;

        // 完整歌词（你给的《回忆》全文）
        const lyrics = [
            {time:0, text:"回忆"},
            {time:1, text:"作词:James/H 作曲:James/H"},
            {time:3, text:"编曲:James 制作人:James"},
            {time:5, text:"陪唱:James"},
            {time:7, text:"过往的回忆"},
            {time:9, text:"都已成过去"},
            {time:11, text:"你留下的痕迹"},
            {time:13, text:"触动我的心"},
            {time:15, text:"你留下的东西"},
            {time:17, text:"我还 舍不得丢弃"},
            {time:19, text:"你的身影 在脑海里 挥之不去"},
            {time:23, text:"想起我们当时有那么的甜蜜"},
            {time:27, text:"为何我们会变得如此疏离"},
            {time:31, text:"可能因为有事情就选择去逃避"},
            {time:35, text:"何必"},
            {time:37, text:"淡忘的记忆"},
            {time:39, text:"想也想不起"},
            {time:41, text:"关于你的一切"},
            {time:43, text:"我都渐渐的忘记"},
            {time:45, text:"我的世界里"},
            {time:47, text:"又只剩下自己"},
            {time:49, text:"想你"},
            {time:53, text:"想起我们当时有那么的甜蜜"},
            {time:57, text:"为何我们会变得如此疏离"},
            {time:61, text:"可能因为有事情就选择去逃避"},
            {time:65, text:"何必"},
            {time:67, text:"怎么回事呢"},
            {time:69, text:"我还爱你呢"},
            {time:71, text:"我们还有没有可能在一起呢"},
            {time:75, text:"在一起呢"},
            {time:77, text:"真的想你了"},
            {time:79, text:"不可自拔了"},
            {time:81, text:"你会不会又突然想起我呢"},
            {time:85, text:"想起我呢"}
        ];

        // 加载歌词
        function loadLyrics(){
            const box = document.getElementById("lyrics");
            lyrics.forEach(item=>{
                let div = document.createElement("div");
                div.className = "lyric-line";
                div.dataset.time = item.time;
                div.innerText = item.text;
                box.appendChild(div);
            });
        }

        // 播放暂停
        document.getElementById("playBtn").onclick = function(){
            if(isPlaying){
                audio.pause();
                this.innerText = "▶";
            }else{
                audio.play();
                this.innerText = "❙❙";
            }
            isPlaying = !isPlaying;
        }

        // 进度条
        audio.addEventListener("timeupdate",function(){
            let percent = (this.currentTime / this.duration) * 100;
            document.getElementById("progressBar").style.width = percent + "%";
            document.getElementById("currentTime").innerText = formatTime(this.currentTime);
            document.getElementById("duration").innerText = formatTime(this.duration);
            syncLyric(this.currentTime);
        });

        function formatTime(t){
            let m = Math.floor(t/60).toString().padStart(2,"0");
            let s = Math.floor(t%60).toString().padStart(2,"0");
            return m+":"+s;
        }

        // 歌词同步高亮
        function syncLyric(current){
            let lines = document.querySelectorAll(".lyric-line");
            lines.forEach(line=>line.classList.remove("active"));
            for(let i=0;i<lines.length;i++){
                if(current >= lines[i].dataset.time){
                    lines[i].classList.add("active");
                    lines[i].scrollIntoView({behavior:"smooth",block:"center"});
                }
            }
        }

        // 进度条点击跳转
        document.getElementById("progress").onclick = function(e){
            let pos = e.offsetX / this.offsetWidth;
            audio.currentTime = pos * audio.duration;
        }

        loadLyrics();
    </script>
</body>
</html>
