<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的原创音乐 - 回忆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 微软雅黑;
        }
        body {
            background: #121212;
            min-height: 100vh;
            color: #fff;
            padding: 30px 20px;
        }
        h1 {
            color: #d4af37;
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 40px;
            font-size: 32px;
        }
        .music-container {
            max-width: 600px;
            margin: 0 auto;
            background: #1e1e1e;
            border: 2px solid #d4af37;
            border-radius: 15px;
            padding: 30px 20px;
        }
        .cover {
            width: 200px;
            height: 200px;
            border-radius: 10px;
            margin: 0 auto 25px;
            background: #222;
            border: 2px solid #d4af37;
        }
        .song-info {
            text-align: center;
            margin-bottom: 15px;
        }
        .song-title {
            font-size: 24px;
            font-weight: bold;
            color: #d4af37;
            margin-bottom: 8px;
        }
        .song-singer {
            font-size: 16px;
            color: #888;
        }
        .loading {
            text-align:center;
            color:#888;
            margin-bottom:20px;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #d4af37;
            color: #121212;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .btn:hover {
            background: #b9962c;
            transform: scale(1.05);
        }
        .progress {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .progress-bar {
            height: 100%;
            background: #d4af37;
            border-radius: 4px;
            width: 0%;
        }
        .time {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
        }
        .lyrics {
            height: 160px;
            overflow-y: auto;
            text-align: center;
            line-height: 1.8;
            font-size: 16px;
            padding: 10px;
            background: #222;
            border-radius: 8px;
        }
        .lyrics::-webkit-scrollbar { width: 5px; }
        .lyrics::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 5px; }
        .lyric-line {
            transition: 0.3s;
            opacity: 0.6;
        }
        .lyric-line.active {
            color: #d4af37;
            opacity: 1;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>我的原创音乐空间</h1>
    <div class="music-container">
        <div class="cover"></div>
        <div class="song-info">
            <div class="song-title">回忆</div>
            <div class="song-singer">陈以文</div>
        </div>
        <div class="loading" id="loadTip">歌曲加载中...</div>

        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="time">
            <span id="currentTime">00:00</span>
            <span id="duration">00:00</span>
        </div>

        <div class="controls">
            <button class="btn" id="playBtn">▶</button>
        </div>

        <div class="lyrics" id="lyricsBox"></div>
    </div>

    <script>
        // 精准匹配你改名后的歌曲
        const audio = new Audio("music/song1.mp3");
        let isPlay = false;

        // 完整歌词
        const lyricList = [
            {time:0, text:"回忆"},
            {time:1, text:"作词：穆华恩、陈以文"},
            {time:3, text:"作曲、演唱：陈以文"},
            {time:7, text:"当我拿起笔 写下这段旋律"},
            {time:11, text:"心中的话 终于可以表达"},
            {time:15, text:"过往的回忆 都已成过去"},
            {time:19, text:"你留下的痕迹 触动我的心"},
            {time:23, text:"想起我们当时有那么的甜蜜"},
            {time:27, text:"为何我们会变得如此疏离"}
        ];

        // 渲染歌词
        function initLyric(){
            lyricList.forEach(l=>{
                const div = document.createElement('div');
                div.className = 'lyric-line';
                div.dataset.t = l.time;
                div.innerText = l.text;
                lyricsBox.appendChild(div);
            })
        }

        // 播放/暂停
        playBtn.onclick = ()=>{
            if(isPlay){
                audio.pause();
                playBtn.innerText = "▶";
            }else{
                audio.play();
                playBtn.innerText = "❙❙";
            }
            isPlay = !isPlay;
        }

        // 加载完成提示
        audio.oncanplaythrough = ()=>{
            document.getElementById('loadTip').innerText = "歌曲已就绪，点击播放";
        }

        // 进度+歌词同步
        audio.ontimeupdate = e=>{
            const t = audio.currentTime;
            const all = audio.duration;
            progressBar.style.width = `${(t/all)*100}%`;
            currentTime.innerText = `${Math.floor(t/60).toString().padStart(2,'0')}:${Math.floor(t%60).toString().padStart(2,'0')}`;
            duration.innerText = `${Math.floor(all/60).toString().padStart(2,'0')}:${Math.floor(all%60).toString().padStart(2,'0')}`;

            // 歌词高亮
            document.querySelectorAll('.lyric-line').forEach(line=>line.classList.remove('active'));
            lyricList.forEach((l,i)=>{
                if(t >= l.time) document.querySelectorAll('.lyric-line')[i].classList.add('active');
            })
        }

        initLyric();
    </script>
</body>
</html>
