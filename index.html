<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的原创音乐站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 微软雅黑;
        }
        body {
            background: #121212;
            min-height: 100vh;
            color: #fff;
            padding: 30px 20px;
        }
        h1 {
            color: #d4af37;
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 40px;
            font-size: 32px;
        }
        .music-container {
            max-width: 600px;
            margin: 0 auto;
            background: #1e1e1e;
            border: 2px solid #d4af37;
            border-radius: 15px;
            padding: 30px 20px;
        }
        .cover {
            width: 200px;
            height: 200px;
            border-radius: 10px;
            margin: 0 auto 25px;
            background: #222 url('cover.jpg') center/cover no-repeat;
            border: 2px solid #d4af37;
        }
        .song-info {
            text-align: center;
            margin-bottom: 25px;
        }
        .song-title {
            font-size: 24px;
            font-weight: bold;
            color: #d4af37;
            margin-bottom: 8px;
        }
        .song-singer {
            font-size: 16px;
            color: #888;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #d4af37;
            color: #121212;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .btn:hover {
            background: #b9962c;
            transform: scale(1.05);
        }
        .progress {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .progress-bar {
            height: 100%;
            background: #d4af37;
            border-radius: 4px;
            width: 0%;
        }
        .time {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }
        .lyrics {
            height: 160px;
            overflow-y: auto;
            text-align: center;
            line-height: 1.8;
            font-size: 16px;
            padding: 10px;
            background: #222;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .lyrics::-webkit-scrollbar {
            width: 5px;
        }
        .lyrics::-webkit-scrollbar-track {
            background: #333;
            border-radius: 5px;
        }
        .lyrics::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 5px;
        }
        .lyric-line {
            transition: 0.3s;
            opacity: 0.6;
        }
        .lyric-line.active {
            color: #d4af37;
            opacity: 1;
            font-weight: bold;
        }
        .playlist {
            margin-top: 20px;
            background: #222;
            border-radius: 8px;
            padding: 15px;
        }
        .playlist-title {
            color: #d4af37;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .song-item {
            padding: 8px 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .song-item:hover {
            background: #333;
        }
        .song-item.active {
            background: #d4af37;
            color: #121212;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>我的原创音乐空间</h1>

    <div class="music-container">
        <div class="cover" id="cover"></div>
        
        <div class="song-info">
            <div class="song-title" id="songTitle">未播放歌曲</div>
            <div class="song-singer" id="songSinger">未知歌手</div>
        </div>

        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="time">
            <span id="currentTime">00:00</span>
            <span id="duration">00:00</span>
        </div>

        <div class="controls">
            <button class="btn" id="prevBtn">◀</button>
            <button class="btn" id="playBtn">▶</button>
            <button class="btn" id="nextBtn">▶▶</button>
        </div>

        <div class="lyrics" id="lyrics">
            <div class="lyric-line">等待播放歌曲...</div>
        </div>

        <div class="playlist">
            <div class="playlist-title">我的原创歌曲</div>
            <div class="song-item active" data-index="0">歌曲1 - 我的第一首歌</div>
            <div class="song-item" data-index="1">歌曲2 - 深夜独白</div>
            <div class="song-item" data-index="2">歌曲3 - 夏日记忆</div>
        </div>
    </div>

    <script>
        // 歌曲数据配置（这里可以添加你自己的歌曲）
        const songs = [
            {
                title: "我的第一首歌",
                singer: "穆华恩",
                audio: "music/song1.mp3",
                cover: "covers/cover1.jpg",
                lyrics: [
                    {time: 0, text: "我的第一首歌"},
                    {time: 2, text: "作词：穆华恩"},
                    {time: 4, text: "作曲：穆华恩"},
                    {time: 6, text: "当我拿起笔 写下这段旋律"},
                    {time: 10, text: "心中的话 终于可以表达"},
                    {time: 14, text: "每一个音符 都是我的心情"},
                    {time: 18, text: "每一句歌词 都有我的故事"},
                    {time: 22, text: "这是我的歌 写给我自己"},
                    {time: 26, text: "也是写给 所有懂我的人"},
                    {time: 30, text: "希望你们能听到 我的声音"},
                    {time: 34, text: "感受到我 最真实的情感"}
                ]
            },
            {
                title: "深夜独白",
                singer: "穆华恩",
                audio: "music/song2.mp3",
                cover: "covers/cover2.jpg",
                lyrics: [
                    {time: 0, text: "深夜独白"},
                    {time: 2, text: "作词：穆华恩"},
                    {time: 4, text: "作曲：穆华恩"},
                    {time: 6, text: "夜深人静 我独自坐在窗前"},
                    {time: 10, text: "看着窗外 闪烁的星光点点"},
                    {time: 14, text: "心中的思绪 像潮水般涌现"},
                    {time: 18, text: "有太多的话 想对自己说"},
                    {time: 22, text: "这是我的独白 在深夜里蔓延"},
                    {time: 26, text: "没有听众 只有我自己听见"},
                    {time: 30, text: "也许明天 一切都会改变"},
                    {time: 34, text: "但此刻的我 只想真实一点"}
                ]
            },
            {
                title: "夏日记忆",
                singer: "穆华恩",
                audio: "music/song3.mp3",
                cover: "covers/cover3.jpg",
                lyrics: [
                    {time: 0, text: "夏日记忆"},
                    {time: 2, text: "作词：穆华恩"},
                    {time: 4, text: "作曲：穆华恩"},
                    {time: 6, text: "那年夏天 阳光格外耀眼"},
                    {time: 10, text: "我们一起 走过了那条街"},
                    {time: 14, text: "冰淇淋融化 在嘴角的甜"},
                    {time: 18, text: "是我记忆里 最美好的画面"},
                    {time: 22, text: "如今的我 还时常会想念"},
                    {time: 26, text: "那些日子 简单又很纯粹"},
                    {time: 30, text: "虽然已经过去 很多年"},
                    {time: 34, text: "那份温暖 依然在我心间"}
                ]
            }
        ];

        // 初始化播放器
        const audio = new Audio();
        let currentSongIndex = 0;
        let isPlaying = false;

        // DOM元素
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const songTitle = document.getElementById('songTitle');
        const songSinger = document.getElementById('songSinger');
        const cover = document.getElementById('cover');
        const lyrics = document.getElementById('lyrics');
        const songItems = document.querySelectorAll('.song-item');

        // 加载歌曲
        function loadSong(song) {
            songTitle.textContent = song.title;
            songSinger.textContent = song.singer;
            audio.src = song.audio;
            cover.style.background = `#222 url('${song.cover}') center/cover no-repeat`;
            
            // 加载歌词
            loadLyrics(song.lyrics);
        }

        // 加载歌词
        function loadLyrics(lyricData) {
            lyrics.innerHTML = '';
            lyricData.forEach(lyric => {
                const line = document.createElement('div');
                line.className = 'lyric-line';
                line.dataset.time = lyric.time;
                line.textContent = lyric.text;
                lyrics.appendChild(line);
            });
        }

        // 播放/暂停
        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                playBtn.textContent = '▶';
            } else {
                audio.play();
                playBtn.textContent = '❙❙';
            }
            isPlaying = !isPlaying;
        }

        // 切换歌曲
        function changeSong(direction) {
            currentSongIndex = (currentSongIndex + direction + songs.length) % songs.length;
            loadSong(songs[currentSongIndex]);
            updateActiveSongItem();
            
            if (isPlaying) {
                audio.play();
            }
        }

        // 更新播放列表选中状态
        function updateActiveSongItem() {
            songItems.forEach(item => item.classList.remove('active'));
            songItems[currentSongIndex].classList.add('active');
        }

        // 更新进度条
        function updateProgress(e) {
            const { duration, currentTime } = e.srcElement;
            const progressPercent = (currentTime / duration)*100;
            progressBar.style.width = `${progressPercent}%`;

            // 更新时间显示
            currentTimeEl.textContent = formatTime(currentTime);
            durationEl.textContent = formatTime(duration);

            // 同步歌词
            syncLyrics(currentTime);
        }

        // 格式化时间
        function formatTime(time) {
            const minutes = Math.floor(time / 60);
            const seconds = Math.floor(time % 60);
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // 歌词同步
        function syncLyrics(currentTime) {
            const lyricLines = document.querySelectorAll('.lyric-line');
            let activeLineIndex = -1;

            lyricLines.forEach((line, index) => {
                const lineTime = parseFloat(line.dataset.time);
                if (currentTime >= lineTime) {
                    activeLineIndex = index;
                }
            });

            if (activeLineIndex !== -1) {
                lyricLines.forEach(line => line.classList.remove('active'));
                lyricLines[activeLineIndex].classList.add('active');
                
                // 滚动歌词
                if (activeLineIndex > 3) {
                    lyrics.scrollTop = (activeLineIndex - 3)*30;
                } else {
                    lyrics.scrollTop = 0;
                }
            }
        }

        // 进度条点击跳转
        function setProgress(e) {
            const width = this.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        }

        // 事件监听
        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', () => changeSong(-1));
        nextBtn.addEventListener('click', () => changeSong(1));
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', () => changeSong(1));
        progress.addEventListener('click', setProgress);
        
        // 播放列表点击
        songItems.forEach(item => {
            item.addEventListener('click', () => {
                currentSongIndex = parseInt(item.dataset.index);
                loadSong(songs[currentSongIndex]);
                updateActiveSongItem();
                if (isPlaying) {
                    audio.play();
                }
            });
        });

        // 初始化加载第一首歌
        loadSong(songs[currentSongIndex]);
        updateActiveSongItem();
    </script>
</body>
</html>
